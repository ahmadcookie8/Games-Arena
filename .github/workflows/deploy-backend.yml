name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'packages/game-engine/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify backend
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --no-audit --no-fund

      - name: Test deterministic replay engine
        run: npm test
        working-directory: packages/game-engine

      - name: Run backend CI tests
        run: npm run test:ci

      - name: Build backend
        run: npm run build

  build:
    name: Build and publish immutable image
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    outputs:
      image_digest: ${{ steps.push.outputs.image_digest }}
    env:
      IMAGE_NAME: ahmadcookie8/games-arena-backend
      IMAGE_TAG: ahmadcookie8/games-arena-backend:${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to Docker Hub
        shell: bash
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$DOCKER_HUB_USERNAME" ]]; then
            echo "::error::Missing required production secret/config: DOCKER_HUB_USERNAME"
            exit 1
          fi
          if [[ -z "$DOCKER_HUB_PASSWORD" ]]; then
            echo "::error::Missing required production secret/config: DOCKER_HUB_PASSWORD"
            exit 1
          fi
          if [[ "$DOCKER_HUB_USERNAME" != "ahmadcookie8" ]]; then
            echo "::error::DOCKER_HUB_USERNAME must own $IMAGE_NAME"
            exit 1
          fi
          printf '%s' "$DOCKER_HUB_PASSWORD" | docker login --username "$DOCKER_HUB_USERNAME" --password-stdin

      - name: Build and push commit-addressed image
        id: push
        shell: bash
        run: |
          set -euo pipefail
          docker build --file backend/Dockerfile --tag "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

          digest_ref="$(docker image inspect --format='{{index .RepoDigests 0}}' "$IMAGE_TAG")"
          image_digest="${digest_ref##*@}"
          if [[ ! "$image_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Docker returned an invalid image digest"
            exit 1
          fi
          if [[ "$digest_ref" != "$IMAGE_NAME@$image_digest" ]]; then
            echo "::error::Docker returned a digest for an unexpected repository"
            exit 1
          fi
          echo "image_digest=$image_digest" >> "$GITHUB_OUTPUT"

      - name: Log out of Docker Hub
        if: ${{ always() }}
        run: docker logout

  deploy:
    name: Deploy exact image digest
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
      IMAGE_REF: ahmadcookie8/games-arena-backend@${{ needs.build.outputs.image_digest }}
      SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure pinned SSH host identity
        shell: bash
        run: |
          set -euo pipefail
          require_value() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              echo "::error::Missing required production secret/config: $name"
              return 1
            fi
          }

          require_value EC2_HOST "$EC2_HOST"
          require_value IMAGE_DIGEST "$IMAGE_DIGEST"
          require_value EC2_SSH_KEY "$SSH_PRIVATE_KEY"
          require_value EC2_KNOWN_HOSTS "$SSH_KNOWN_HOSTS"
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Build produced an invalid image digest"
            exit 1
          fi

          install -m 0700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 0600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/known_hosts"

      - name: Verify EC2 deployment prerequisites
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "ubuntu@${EC2_HOST}" 'bash -se' <<'REMOTE'
          set -euo pipefail
          deploy_root=/home/ubuntu/Games-Arena/backend
          test -d "$deploy_root" || { echo "Deployment directory is missing: $deploy_root" >&2; exit 1; }
          test -f "${deploy_root}/.env" || { echo "Production .env is missing" >&2; exit 1; }
          command -v docker >/dev/null || { echo "Docker is not installed" >&2; exit 1; }
          command -v curl >/dev/null || { echo "curl is not installed" >&2; exit 1; }
          docker compose version >/dev/null
          REMOTE

      - name: Upload candidate Compose file
        shell: bash
        run: |
          set -euo pipefail
          scp -i "$HOME/.ssh/deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            backend/docker-compose.yml \
            "ubuntu@${EC2_HOST}:/home/ubuntu/Games-Arena/backend/docker-compose.yml.next"

      - name: Deploy, verify health, and roll back on failure
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "ubuntu@${EC2_HOST}" "bash -s -- '$IMAGE_REF'" <<'REMOTE'
          set -euo pipefail

          image_ref="$1"
          deploy_root=/home/ubuntu/Games-Arena/backend
          current_compose="${deploy_root}/docker-compose.yml"
          candidate_compose="${current_compose}.next"
          previous_compose="${current_compose}.previous"
          previous_image_file="${deploy_root}/backend-image.previous"

          wait_for_local_health() {
            local deadline=$((SECONDS + 120))
            while (( SECONDS < deadline )); do
              if curl --silent --show-error --fail --max-time 5 \
                --connect-timeout 2 \
                http://127.0.0.1:3000/api/health >/dev/null; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          wait_for_public_health() {
            local deadline=$((SECONDS + 30))
            while (( SECONDS < deadline )); do
              if curl --silent --show-error --fail --max-time 5 \
                --connect-timeout 2 \
                --resolve api.penguincookie.ca:443:127.0.0.1 \
                https://api.penguincookie.ca/api/health >/dev/null; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          cd "$deploy_root"
          test -f .env || { echo "Production .env is missing" >&2; exit 1; }
          test -f "$current_compose" || { echo "Current Compose file is missing" >&2; exit 1; }
          test -f "$candidate_compose" || { echo "Candidate Compose file is missing" >&2; exit 1; }
          if [[ ! "$image_ref" =~ ^ahmadcookie8/games-arena-backend@sha256:[0-9a-f]{64}$ ]]; then
            echo "Candidate image reference is invalid" >&2
            exit 1
          fi
          export NODE_ENV=production
          export CORS_ORIGIN=https://games.penguincookie.ca

          BACKEND_IMAGE="$image_ref" docker compose \
            --env-file .env -f "$candidate_compose" config --quiet

          current_container="$(docker compose --env-file .env -f "$current_compose" ps -q node)"
          test -n "$current_container" || { echo "Current backend container is not running" >&2; exit 1; }
          previous_image="$(docker inspect --format='{{.Config.Image}}' "$current_container")"
          test -n "$previous_image" || { echo "Could not determine the rollback image" >&2; exit 1; }
          docker image inspect "$previous_image" >/dev/null

          cp -p -- "$current_compose" "$previous_compose"
          previous_image_temp="${previous_image_file}.tmp"
          printf '%s\n' "$previous_image" > "$previous_image_temp"
          chmod 0600 "$previous_image_temp"
          mv -f -- "$previous_image_temp" "$previous_image_file"

          if ! (
            set -e
            mv -f -- "$candidate_compose" "$current_compose"
            BACKEND_IMAGE="$image_ref" docker compose \
              --env-file .env -f "$current_compose" pull node
            BACKEND_IMAGE="$image_ref" docker compose \
              --env-file .env -f "$current_compose" up -d --no-build node
            candidate_container="$(BACKEND_IMAGE="$image_ref" docker compose \
              --env-file .env -f "$current_compose" ps -q node)"
            test -n "$candidate_container"
            candidate_image="$(docker inspect --format='{{.Config.Image}}' "$candidate_container")"
            test "$candidate_image" = "$image_ref"
            wait_for_local_health
            wait_for_public_health
          ); then
            echo "Deployment failed; restoring the previous Compose file and image" >&2
            cp -p -- "$previous_compose" "$current_compose"
            if ! BACKEND_IMAGE="$previous_image" docker compose \
              --env-file .env -f "$current_compose" up -d --no-build node; then
              echo "Rollback could not restart the previous image" >&2
              exit 1
            fi
            if ! wait_for_local_health || ! wait_for_public_health; then
              echo "Rollback started, but health verification failed" >&2
              docker compose --env-file .env -f "$current_compose" ps >&2 || true
              docker compose --env-file .env -f "$current_compose" \
                logs --no-color --tail 100 node >&2 || true
              exit 1
            fi
            echo "Previous backend image restored successfully" >&2
            exit 1
          fi

          echo "Backend deployed successfully: $image_ref"
          REMOTE
