name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd backend
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/games-arena-backend:latest .
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/games-arena-backend:latest ${{ secrets.DOCKER_HUB_USERNAME }}/games-arena-backend:${{ github.sha }}

      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/games-arena-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/games-arena-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/Games-Arena/backend
            export BACKEND_IMAGE=${{ secrets.DOCKER_HUB_USERNAME }}/games-arena-backend:latest
            docker compose pull
            docker compose up -d --no-build
