name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  game-engine:
    name: Shared game engine checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/game-engine
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Test deterministic replay engine
        run: npm test

  backend:
    name: Backend checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://127.0.0.1:27017/games_arena_security_integration
      REDIS_URL: redis://127.0.0.1:6379/15
      JWT_SECRET: ci-only-security-integration-secret
      CORS_ORIGIN: http://localhost:5173
      RUN_SECURITY_INTEGRATION: '1'
    services:
      mongo:
        image: mongo:8.0@sha256:ffa440e8d62533e24a67696ae1bbb46e610ebb3167d65abd122b496ae06d28e6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test (unit and real-service security integration)
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high

  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high

  frontend-browser:
    name: Frontend Chromium accessibility
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deterministic browser and Axe tests
        run: npm run test:e2e

      - name: Upload browser diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-browser-results
          path: |
            frontend/node_modules/.cache/playwright-results
            frontend/node_modules/.cache/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  frontend-visual:
    name: Frontend Chromium responsive visuals
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture responsive and reduced-motion coverage
        run: npm run test:visual

      - name: Upload responsive screenshots and traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-responsive-screenshots
          path: frontend/node_modules/.cache/playwright-results
          if-no-files-found: error
          retention-days: 14

  container-security:
    name: Container builds and scans
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve pinned Redis image
        id: redis-image
        shell: bash
        run: |
          set -euo pipefail
          image_ref="$(awk '/^  redis:/{service=1; next} service && $1 == "image:" {print $2; exit}' backend/docker-compose.yml)"
          case "$image_ref" in
            redis:*@sha256:*) ;;
            *) echo "Redis image must be pinned by digest" >&2; exit 1 ;;
          esac
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: backend/Dockerfile
          load: true
          push: false
          tags: games-arena-backend:ci
          cache-from: type=gha,scope=backend-security
          cache-to: type=gha,mode=max,scope=backend-security

      - name: Build frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: frontend/Dockerfile
          load: true
          push: false
          tags: games-arena-frontend:ci
          cache-from: type=gha,scope=frontend-security
          cache-to: type=gha,mode=max,scope=frontend-security

      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: games-arena-backend:ci
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
          format: table

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: games-arena-frontend:ci
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
          format: table

      - name: Scan pinned Redis image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.redis-image.outputs.image_ref }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
          format: table

      - name: Generate backend image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: games-arena-backend:ci
          format: spdx-json
          output-file: games-arena-backend.spdx.json
          artifact-name: games-arena-backend-ci-sbom

      - name: Generate frontend image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: games-arena-frontend:ci
          format: spdx-json
          output-file: games-arena-frontend.spdx.json
          artifact-name: games-arena-frontend-ci-sbom

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  repository-scan:
    name: Repository security scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan dependencies, configuration, and secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
          format: table

      - name: Scan repository for secrets at every severity
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '1'
          format: table

      - name: Generate source SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: games-arena-source.spdx.json
          artifact-name: games-arena-source-sbom
